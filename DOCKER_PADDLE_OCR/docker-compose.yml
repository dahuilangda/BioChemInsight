services:
  paddle-ocr-server:
    build: .
    container_name: paddle-ocr-server
    restart: unless-stopped
    shm_size: "2g"
    ports:
      - "8010:8010"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${PADDLEOCR_GPU:-0}
      - PYTHONUNBUFFERED=1
      # Recommended baseline for RTX 4070 Ti + current NVIDIA driver stack.
      - PADDLEOCR_DEVICE=gpu
      - PADDLEOCR_RENDER_SCALE=1.3
      - PADDLEOCR_USE_DOC_ORIENTATION=false
      - PADDLEOCR_USE_DOC_UNWARPING=false
    volumes:
      - ./cache/paddlex:/root/.paddlex
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${PADDLEOCR_GPU:-0}"]
              capabilities: [gpu]

networks:
  default:
    name: paddle_ocr_net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.174.201.0/24
          gateway: 172.174.201.1
